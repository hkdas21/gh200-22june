name: tiemout

on: push

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true           # Cancel older runs on same branch

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 10              # Job timeout
    steps:
      - name: ⏱️ Step with Timeout
        timeout-minutes: 1  # Step timeout
        continue-on-error: true
        run: |
          echo "This step must complete in 1 minutes"
          echo "Completed within time!"

      - name: verify fail
        run: echo "test successfull"

  deploy:
    runs-on: ubuntu-latest
    # Only deploy on push to main, not PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    steps:
      - name: 📋 Show Context Info
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Actor: ${{ github.actor }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "SHA: ${{ github.sha }}"
          echo "Runner: ${{ runner.os }} / ${{ runner.arch }}"
          echo "Workflow: ${{ github.workflow }}"
          echo "Run Number: ${{ github.run_number }}"

      - name: ✅ Deploy Step (only on success)
        if: success()
        run: echo "🚀 Deploying to production!"

      - name: 🚨 Notify on Failure
        if: failure()
        run: echo "❌ Deployment failed! Sending alert..."

      - name: 🧹 Always Cleanup
        if: always()
        run: echo "🧹 Cleaning up resources..."
